<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/fire-extinguisher.png" />
    <link rel="apple-touch-icon" href="/fire-extinguisher.png" />
    <title>Gestão de Extintores</title>
    <!-- Apply the saved/OS theme before paint to avoid a light-mode flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("tema");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
