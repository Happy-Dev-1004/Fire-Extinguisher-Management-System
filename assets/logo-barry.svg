<svg xmlns="http://www.w3.org/2000/svg" width="220" height="44" viewBox="0 0 220 44">
  <!-- Red background banner -->
  <rect width="220" height="44" fill="#C8102E"/>

  <!-- Thin white border inside -->
  <rect x="3" y="3" width="214" height="38" fill="none" stroke="white" stroke-width="1.2"/>

  <!-- BARRY text -->
  <text x="52" y="29" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="end" letter-spacing="1">BARRY</text>

  <!-- Cacao pod icon — oval with vertical ridges -->
  <ellipse cx="115" cy="22" rx="11" ry="15" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Vertical ridges on pod -->
  <line x1="110" y1="9"  x2="109" y2="35" stroke="white" stroke-width="0.9"/>
  <line x1="115" y1="7"  x2="115" y2="37" stroke="white" stroke-width="0.9"/>
  <line x1="120" y1="9"  x2="121" y2="35" stroke="white" stroke-width="0.9"/>
  <!-- Stem -->
  <line x1="115" y1="7" x2="115" y2="4"  stroke="white" stroke-width="1.5"/>
  <line x1="115" y1="4" x2="119" y2="2"  stroke="white" stroke-width="1.2"/>

  <!-- CALLEBAUT text -->
  <text x="178" y="29" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="end" letter-spacing="1">CALLEBAUT</text>
</svg>
